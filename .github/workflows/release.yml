name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  # ─── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run domain tests
        run: ./gradlew :shared:domain:jvmTest

      - name: Run data tests
        run: ./gradlew :shared:data:jvmTest

  # ─── Android APK ─────────────────────────────────────────────────────────────
  android:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: androidApp/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # ─── iOS IPA ─────────────────────────────────────────────────────────────────
  ios:
    name: iOS IPA
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build SharedPresentation XCFramework
        run: ./gradlew :shared:presentation:assembleSharedPresentationXCFramework

      - name: Copy XCFramework into Xcode project
        run: |
          mkdir -p iosApp/Frameworks
          cp -R shared/presentation/build/XCFrameworks/release/SharedPresentation.xcframework \
               iosApp/Frameworks/SharedPresentation.xcframework

      # ── Unsigned path: build for simulator + package as IPA-compatible zip ──────
      - name: Build for simulator (unsigned)
        if: ${{ secrets.IOS_CERT_BASE64 == '' }}
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath $RUNNER_TEMP/derivedData \
            2>&1 | tail -20

      - name: Package simulator app
        if: ${{ secrets.IOS_CERT_BASE64 == '' }}
        run: |
          APP_PATH=$(find $RUNNER_TEMP/derivedData -name "iosApp.app" | head -1)
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -R "$APP_PATH" $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa && zip -r iosApp-simulator.ipa Payload

      # ── Signed path: archive + export real IPA for device ────────────────────
      - name: Import signing certificate
        if: ${{ secrets.IOS_CERT_BASE64 != '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$IOS_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Archive (signed)
        if: ${{ secrets.IOS_CERT_BASE64 != '' }}
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ultra.xcarchive

      - name: Export IPA (signed)
        if: ${{ secrets.IOS_CERT_BASE64 != '' }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ultra.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist iosApp/ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.ref_name }}
          path: ${{ runner.temp }}/ipa/
          if-no-files-found: warn
