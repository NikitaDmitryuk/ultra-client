name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ktlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod +x ktlint

      - name: Run ktlint
        run: ./ktlint --relative "{shared,androidApp}/**/*.kt"

  # ─── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run domain tests
        run: ./gradlew :shared:domain:jvmTest

      - name: Run data tests
        run: ./gradlew :shared:data:jvmTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            shared/domain/build/reports/tests/jvmTest/
            shared/data/build/reports/tests/jvmTest/
